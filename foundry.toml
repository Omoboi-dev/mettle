[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Mantle Sepolia testnet (chainId 5003) — the deploy target for the hackathon.
[rpc_endpoints]
mantle_sepolia = "https://rpc.sepolia.mantle.xyz"

# Contract verification on Mantlescan (Etherscan-compatible explorer for Mantle Sepolia).
[etherscan]
mantle_sepolia = { key = "${MANTLESCAN_API_KEY}", url = "https://api-sepolia.mantlescan.xyz/api", chain = 5003 }
