[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Mantle Sepolia testnet (chainId 5003) — the deploy target for the hackathon.
[rpc_endpoints]
mantle_sepolia = "https://rpc.sepolia.mantle.xyz"

# Contract verification on Mantlescan. It's Etherscan-family, so a single Etherscan API key
# verifies via the unified V2 API (keyed by chainId 5003).
[etherscan]
mantle_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 5003 }
